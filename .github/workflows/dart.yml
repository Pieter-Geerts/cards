# This workflow builds a Flutter application, runs tests, and uploads the artifacts.
name: Flutter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create key.properties
        run: |
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: Decode upload-keystore.jks
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create assets directory
        run: mkdir -p assets/icons

      - name: Install dependencies
        run: flutter pub get

      - name: Format code
        run: dart format .

      - name: Analyze project source (allow infos)
        run: |
          set -o pipefail
          echo "Running analyzer (will fail on errors or warnings, infos allowed)..."
          dart analyze --format=json > analysis.json 2>&1 || true
          python3 - <<'PY'
import json,sys
try:
    with open('analysis.json') as f:
        j=json.load(f)
except Exception as e:
    print('Could not read analyzer JSON output:', e)
    sys.exit(0)
issues=j.get('diagnostics', [])
errs=[i for i in issues if i.get('severity') in ('ERROR','WARNING')]
if errs:
    print('Analyzer found errors/warnings:')
    for e in errs:
        loc=e.get('location',{})
        file=loc.get('file')
        rng=loc.get('range',{}).get('start',{})
        line=rng.get('line')
        print(f"{e.get('severity')}: {e.get('problemMessage')} ({file}:{line})")
    sys.exit(1)
else:
    print('No analyzer errors or warnings found. Info-level messages are allowed.')
PY

      - name: Run tests
        run: flutter test

      # Build Android App Bundle (AAB) with symbols for Play Console
      - name: Build Android App Bundle (AAB) with symbols
        run: flutter build appbundle --obfuscate --split-debug-info=build/symbols --release

      # Archive the AAB and symbols for download
      - name: Upload AAB and symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-and-symbols
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/symbols/

      # Build release APK and save it as an artifact
      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create secrets.dart
        run: |
          cp lib/secrets_template.dart lib/secrets.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n
